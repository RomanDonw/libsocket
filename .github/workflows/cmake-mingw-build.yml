name: Windows x86-64 MSYS2 MinGW UCRT64
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout libnthread code
        uses: actions/checkout@v4
        with:
          repository: RomanDonw/libnthread
          path: libnthread

      - name: Setup dependencies
        shell: msys2 {0}
        run: |
            cd libnthread

            mkdir build
            cd build

            cmake -S .. -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$MSYSTEM_PREFIX -G "MinGW Makefiles"
            mingw32-make install

            cmake -S .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=$MSYSTEM_PREFIX -G "MinGW Makefiles"
            mingw32-make install

      - name: Configure and Build
        shell: msys2 {0}
        run: |
          mkdir build
          cd build

          cmake -S .. -G "MinGW Makefiles" -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$MSYSTEM_PREFIX
          mingw32-make install
          
          cmake -S .. -G "MinGW Makefiles" -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=$MSYSTEM_PREFIX
          mingw32-make install

          rm *.dll.a

          cd ..

          mkdir bin
          mv build/*.exe bin/
          mv build/*.dll bin/

          mkdir lib
          mv build/*.a lib/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64-mingw-ucrt64
          path: |
            bin/*.exe
            bin/*.dll
            lib/*.a
            include/*.h

      - name: Run Tests
        shell: msys2 {0}
        run: |
          cd bin

          ./test1
          ./test2
